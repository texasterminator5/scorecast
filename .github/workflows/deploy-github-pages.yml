# Publishes scoreboard-overlay/ to GitHub Pages (project site).
# Repo Settings → Pages → Build and deployment → Source: GitHub Actions

name: Deploy overlay to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: scoreboard-overlay
      - id: deployment
        uses: actions/deploy-pages@v4
