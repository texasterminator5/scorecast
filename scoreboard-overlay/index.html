<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1">
  <title>Scorecast Broadcast Overlay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: transparent;
      position: relative;
    }
    .scale-root {
      width: 1920px;
      height: 1080px;
      transform-origin: center center;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 78px;
    }
    .broadcast {
      width: 1440px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      min-height: 170px;
    }
    .side {
      width: 500px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      padding: 0;
    }
    .side-head {
      display: none;
    }
    .side-label { display: none; }
    .race-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 96px;
      height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #000;
      background: #fff;
      border: 2px solid #000;
    }
    .players {
      display: grid;
      gap: 8px;
    }
    .player-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #fff;
      border: 2px solid #000;
    }
    .side.right .player-row {
      flex-direction: row-reverse;
    }
    .player-name {
      font-size: 28px;
      font-weight: 780;
      color: #000;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.01em;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
    }
    .side.right .player-name {
      text-align: right;
    }
    .fargo-chip {
      min-width: 62px;
      height: 30px;
      padding: 0 9px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 750;
      color: #000;
      background: #fff;
      border: 2px solid #000;
      flex-shrink: 0;
    }
    .center {
      width: 360px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 0;
    }
    .center-top { display: none; }
    .scores {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
    }
    .score-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .score-race {
      min-width: 88px;
      padding: 4px 10px;
      border-radius: 8px;
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-align: center;
    }
    .score-box {
      width: 142px;
      height: 118px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      font-size: 78px;
      font-weight: 860;
      line-height: 1;
      color: #000;
      text-shadow: 0 5px 22px rgba(0, 0, 0, 0.42);
      border: 2px solid #000;
      background: #fff;
    }
    .score-divider {
      font-size: 44px;
      font-weight: 700;
      color: #000;
      transform: translateY(-3px);
    }
    .meta { display: none; }
    .race-center {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 5px 10px;
      border-radius: 8px;
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .race-center b {
      font-weight: 800;
      color: #000;
      min-width: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="scale-root" id="scaleRoot">
  <div class="broadcast">
    <div class="row">
      <div class="side left">
        <div class="side-head">
          <span class="side-label"></span>
          <span class="race-chip" id="raceLeft">Race -</span>
        </div>
        <div class="players">
          <div class="player-row">
            <span class="player-name" id="p1aName">Player</span>
            <span class="fargo-chip" id="fargo1a">---</span>
          </div>
        </div>
      </div>
      <div class="center">
        <div class="center-top"></div>
        <div class="scores">
          <div class="score-col">
            <span class="score-race" id="raceScoreLeft">Race -</span>
            <span class="score-box" id="score1">0</span>
          </div>
          <span class="score-divider">-</span>
          <div class="score-col">
            <span class="score-race" id="raceScoreRight">Race -</span>
            <span class="score-box" id="score2">0</span>
          </div>
        </div>
        <div class="race-center" id="raceCenter">Race To <b id="raceCenterValue">-</b></div>
        <div class="meta" id="fargoMeta"></div>
      </div>
      <div class="side right">
        <div class="side-head">
          <span class="side-label"></span>
          <span class="race-chip" id="raceRight">Race -</span>
        </div>
        <div class="players">
          <div class="player-row">
            <span class="player-name" id="p2aName">Player</span>
            <span class="fargo-chip" id="fargo2a">---</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  </div>
  <script>
    (function() {
      var DESIGN_W = 1920, DESIGN_H = 1080;
      function applyScale() {
        var w = window.innerWidth, h = window.innerHeight;
        var scaleFit = Math.max(w / DESIGN_W, h / DESIGN_H);
        var scale = Math.max(1, scaleFit);
        var el = document.getElementById('scaleRoot');
        if (el) el.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
      }
      var root = document.getElementById('scaleRoot');
      if (root) {
        root.style.position = 'absolute';
        root.style.left = '50%';
        root.style.top = '50%';
      }
      applyScale();
      window.addEventListener('resize', applyScale);

      var params = new URLSearchParams(window.location.search);
      var room = params.get('room');
      var dbUrl = params.get('db') ? decodeURIComponent(params.get('db')) : '';

      function asBool(v, fallback) {
        if (v == null) return fallback;
        var s = String(v).toLowerCase();
        if (s === '1' || s === 'true' || s === 'yes' || s === 'on') return true;
        if (s === '0' || s === 'false' || s === 'no' || s === 'off') return false;
        return fallback;
      }

      function applyState(data) {
        var d = data || {};
        var p1a = (d.p1a != null ? d.p1a : d.team1 != null ? d.team1 : 'Player').toString();
        var p2a = (d.p2a != null ? d.p2a : d.team2 != null ? d.team2 : 'Player').toString();
        var f1a = (d.fargo1a != null ? d.fargo1a : '').toString();
        var f2a = (d.fargo2a != null ? d.fargo2a : '').toString();
        var s1 = (d.s1 != null ? d.s1 : 0).toString();
        var s2 = (d.s2 != null ? d.s2 : 0).toString();
        var raceTo1 = (d.raceTo1 != null ? d.raceTo1 : '-').toString();
        var raceTo2 = (d.raceTo2 != null ? d.raceTo2 : '-').toString();
        var showRace = asBool(d.showRace, true);
        var showFargo = asBool(d.showFargo, false);
        var sameRace = raceTo1 === raceTo2;
        var raceCenter = sameRace ? raceTo1 : raceTo1 + '/' + raceTo2;

        document.getElementById('p1aName').textContent = p1a;
        document.getElementById('p2aName').textContent = p2a;
        document.getElementById('fargo1a').textContent = f1a || '---';
        document.getElementById('fargo2a').textContent = f2a || '---';
        document.getElementById('raceLeft').textContent = 'Race ' + raceTo1;
        document.getElementById('raceRight').textContent = 'Race ' + raceTo2;
        document.getElementById('raceScoreLeft').textContent = 'Race ' + raceTo1;
        document.getElementById('raceScoreRight').textContent = 'Race ' + raceTo2;
        document.getElementById('raceCenterValue').textContent = raceCenter || '-';
        document.getElementById('score1').textContent = s1;
        document.getElementById('score2').textContent = s2;

        document.getElementById('raceLeft').style.display = showRace ? 'inline-flex' : 'none';
        document.getElementById('raceRight').style.display = showRace ? 'inline-flex' : 'none';
        document.getElementById('raceCenter').style.display = showRace && sameRace ? 'inline-flex' : 'none';
        document.getElementById('raceScoreLeft').style.display = showRace && !sameRace ? 'inline-flex' : 'none';
        document.getElementById('raceScoreRight').style.display = showRace && !sameRace ? 'inline-flex' : 'none';
        document.getElementById('fargoMeta').style.display = showFargo ? 'block' : 'none';
        document.getElementById('fargo1a').style.display = showFargo ? 'inline-flex' : 'none';
        document.getElementById('fargo2a').style.display = showFargo ? 'inline-flex' : 'none';
      }

      if (room && dbUrl) {
        var url = dbUrl.replace(/\/$/, '') + '/rooms/' + encodeURIComponent(room) + '.json';
        function poll() {
          fetch(url).then(function(r) { return r.json(); }).then(applyState).catch(function() {});
        }
        poll();
        setInterval(poll, 2000);
      } else {
        var t1 = params.get('team1');
        var t2 = params.get('team2');
        applyState({
          p1a: params.get('p1a') || (t1 ? decodeURIComponent(t1) : 'Player'),
          p2a: params.get('p2a') || (t2 ? decodeURIComponent(t2) : 'Player'),
          fargo1a: params.get('fargo1a') || '',
          fargo2a: params.get('fargo2a') || '',
          showRace: params.get('showRace'),
          showFargo: params.get('showFargo'),
          s1: params.get('s1') || '0',
          s2: params.get('s2') || '0',
          raceTo1: params.get('raceTo1') || params.get('raceTo') || '-',
          raceTo2: params.get('raceTo2') || params.get('raceTo') || '-'
        });
      }
    })();
  </script>
</body>
</html>
