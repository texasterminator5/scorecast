<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1">
  <title>Scorecast Broadcast Overlay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: transparent;
      position: relative;
    }
    .scale-root {
      width: 1920px;
      height: 1080px;
      transform-origin: center center;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 78px;
    }
    .broadcast {
      position: relative;
      width: 1560px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background:
        linear-gradient(135deg, rgba(15,23,42,0.86), rgba(15,23,42,0.78)),
        linear-gradient(90deg, rgba(56,189,248,0.32), rgba(59,130,246,0.2), rgba(217,70,239,0.28));
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 26px 60px rgba(2, 6, 23, 0.55);
      overflow: hidden;
    }
    .broadcast::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(500px 100px at 20% 0%, rgba(56,189,248,0.22), transparent 65%),
        radial-gradient(500px 120px at 80% 0%, rgba(217,70,239,0.2), transparent 65%);
      pointer-events: none;
    }
    .row {
      display: flex;
      align-items: stretch;
      min-height: 186px;
    }
    .side {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      padding: 24px 26px;
    }
    .side.left {
      border-right: 1px solid rgba(255,255,255,0.1);
      background: linear-gradient(90deg, rgba(56,189,248,0.16), rgba(56,189,248,0.04));
    }
    .side.right {
      border-left: 1px solid rgba(255,255,255,0.1);
      background: linear-gradient(270deg, rgba(217,70,239,0.16), rgba(217,70,239,0.04));
    }
    .side-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
    }
    .side-label {
      font-size: 15px;
      color: rgba(226, 232, 240, 0.85);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .race-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 96px;
      height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #e2e8f0;
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.3);
    }
    .players {
      display: grid;
      gap: 8px;
    }
    .player-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 7px 11px;
      border-radius: 10px;
      background: rgba(2, 6, 23, 0.34);
      border: 1px solid rgba(148, 163, 184, 0.22);
    }
    .player-name {
      font-size: 28px;
      font-weight: 780;
      color: #f8fafc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.01em;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
    }
    .fargo-chip {
      min-width: 62px;
      height: 30px;
      padding: 0 9px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 750;
      color: #bfdbfe;
      background: rgba(30, 64, 175, 0.24);
      border: 1px solid rgba(96, 165, 250, 0.45);
      flex-shrink: 0;
    }
    .center {
      width: 320px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 20px 16px;
      background:
        linear-gradient(180deg, rgba(15,23,42,0.7), rgba(15,23,42,0.82)),
        radial-gradient(400px 120px at 50% 0%, rgba(96,165,250,0.24), transparent 70%);
      border-left: 1px solid rgba(255,255,255,0.1);
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .center-top {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: rgba(148, 163, 184, 0.95);
      font-weight: 700;
    }
    .scores {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
    }
    .score-box {
      width: 128px;
      height: 108px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      font-size: 78px;
      font-weight: 860;
      line-height: 1;
      color: #fff;
      text-shadow: 0 5px 22px rgba(0, 0, 0, 0.42);
      border: 1px solid rgba(255,255,255,0.2);
      background: linear-gradient(180deg, rgba(15,23,42,0.52), rgba(2,6,23,0.72));
    }
    .score-divider {
      font-size: 44px;
      font-weight: 700;
      color: rgba(148,163,184,0.82);
      transform: translateY(-3px);
    }
    .meta {
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(148,163,184,0.95);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="scale-root" id="scaleRoot">
  <div class="broadcast">
    <div class="row">
      <div class="side left">
        <div class="side-head">
          <span class="side-label">Left Side</span>
          <span class="race-chip" id="raceLeft">Race -</span>
        </div>
        <div class="players">
          <div class="player-row">
            <span class="player-name" id="p1aName">Player</span>
            <span class="fargo-chip" id="fargo1a">---</span>
          </div>
          <div class="player-row">
            <span class="player-name" id="p1bName">Player</span>
            <span class="fargo-chip" id="fargo1b">---</span>
          </div>
        </div>
      </div>
      <div class="center">
        <div class="center-top">Scoreboard</div>
        <div class="scores">
          <span class="score-box" id="score1">0</span>
          <span class="score-divider">-</span>
          <span class="score-box" id="score2">0</span>
        </div>
        <div class="meta" id="fargoMeta">Fargo Ratings</div>
      </div>
      <div class="side right">
        <div class="side-head">
          <span class="side-label">Right Side</span>
          <span class="race-chip" id="raceRight">Race -</span>
        </div>
        <div class="players">
          <div class="player-row">
            <span class="player-name" id="p2aName">Player</span>
            <span class="fargo-chip" id="fargo2a">---</span>
          </div>
          <div class="player-row">
            <span class="player-name" id="p2bName">Player</span>
            <span class="fargo-chip" id="fargo2b">---</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  </div>
  <script>
    (function() {
      var DESIGN_W = 1920, DESIGN_H = 1080;
      function applyScale() {
        var w = window.innerWidth, h = window.innerHeight;
        var scaleFit = Math.max(w / DESIGN_W, h / DESIGN_H);
        var scale = Math.max(1, scaleFit);
        var el = document.getElementById('scaleRoot');
        if (el) el.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
      }
      var root = document.getElementById('scaleRoot');
      if (root) {
        root.style.position = 'absolute';
        root.style.left = '50%';
        root.style.top = '50%';
      }
      applyScale();
      window.addEventListener('resize', applyScale);

      var params = new URLSearchParams(window.location.search);
      var room = params.get('room');
      var dbUrl = params.get('db') ? decodeURIComponent(params.get('db')) : '';

      function asBool(v, fallback) {
        if (v == null) return fallback;
        var s = String(v).toLowerCase();
        if (s === '1' || s === 'true' || s === 'yes' || s === 'on') return true;
        if (s === '0' || s === 'false' || s === 'no' || s === 'off') return false;
        return fallback;
      }

      function applyState(data) {
        var d = data || {};
        var p1a = (d.p1a != null ? d.p1a : d.team1 != null ? d.team1 : 'Player').toString();
        var p1b = (d.p1b != null ? d.p1b : 'Player').toString();
        var p2a = (d.p2a != null ? d.p2a : d.team2 != null ? d.team2 : 'Player').toString();
        var p2b = (d.p2b != null ? d.p2b : 'Player').toString();
        var f1a = (d.fargo1a != null ? d.fargo1a : '').toString();
        var f1b = (d.fargo1b != null ? d.fargo1b : '').toString();
        var f2a = (d.fargo2a != null ? d.fargo2a : '').toString();
        var f2b = (d.fargo2b != null ? d.fargo2b : '').toString();
        var s1 = (d.s1 != null ? d.s1 : 0).toString();
        var s2 = (d.s2 != null ? d.s2 : 0).toString();
        var raceTo1 = (d.raceTo1 != null ? d.raceTo1 : '-').toString();
        var raceTo2 = (d.raceTo2 != null ? d.raceTo2 : '-').toString();
        var showRace = asBool(d.showRace, true);
        var showFargo = asBool(d.showFargo, false);

        document.getElementById('p1aName').textContent = p1a;
        document.getElementById('p1bName').textContent = p1b;
        document.getElementById('p2aName').textContent = p2a;
        document.getElementById('p2bName').textContent = p2b;
        document.getElementById('fargo1a').textContent = f1a || '---';
        document.getElementById('fargo1b').textContent = f1b || '---';
        document.getElementById('fargo2a').textContent = f2a || '---';
        document.getElementById('fargo2b').textContent = f2b || '---';
        document.getElementById('raceLeft').textContent = 'Race ' + raceTo1;
        document.getElementById('raceRight').textContent = 'Race ' + raceTo2;
        document.getElementById('score1').textContent = s1;
        document.getElementById('score2').textContent = s2;

        document.getElementById('raceLeft').style.display = showRace ? 'inline-flex' : 'none';
        document.getElementById('raceRight').style.display = showRace ? 'inline-flex' : 'none';
        document.getElementById('fargoMeta').style.display = showFargo ? 'block' : 'none';
        document.getElementById('fargo1a').style.display = showFargo ? 'inline-flex' : 'none';
        document.getElementById('fargo1b').style.display = showFargo ? 'inline-flex' : 'none';
        document.getElementById('fargo2a').style.display = showFargo ? 'inline-flex' : 'none';
        document.getElementById('fargo2b').style.display = showFargo ? 'inline-flex' : 'none';
      }

      if (room && dbUrl) {
        var url = dbUrl.replace(/\/$/, '') + '/rooms/' + encodeURIComponent(room) + '.json';
        function poll() {
          fetch(url).then(function(r) { return r.json(); }).then(applyState).catch(function() {});
        }
        poll();
        setInterval(poll, 2000);
      } else {
        var t1 = params.get('team1');
        var t2 = params.get('team2');
        applyState({
          p1a: params.get('p1a') || (t1 ? decodeURIComponent(t1) : 'Player'),
          p1b: params.get('p1b') || 'Player',
          p2a: params.get('p2a') || (t2 ? decodeURIComponent(t2) : 'Player'),
          p2b: params.get('p2b') || 'Player',
          fargo1a: params.get('fargo1a') || '',
          fargo1b: params.get('fargo1b') || '',
          fargo2a: params.get('fargo2a') || '',
          fargo2b: params.get('fargo2b') || '',
          showRace: params.get('showRace'),
          showFargo: params.get('showFargo'),
          s1: params.get('s1') || '0',
          s2: params.get('s2') || '0',
          raceTo1: params.get('raceTo1') || params.get('raceTo') || '-',
          raceTo2: params.get('raceTo2') || params.get('raceTo') || '-'
        });
      }
    })();
  </script>
</body>
</html>
